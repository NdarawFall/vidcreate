<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VidCreate - Visual Experience</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }

        [data-composition-id="root"] {
            width: 1920px;
            height: 1080px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .scene-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
        }

        .title {
            font-size: 140px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -4px;
            background: linear-gradient(45deg, #fff 30%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 32px;
            color: #888;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .accent-line {
            width: 100px;
            height: 4px;
            background: #fff;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div data-hf-id="hf-wmnh" data-composition-id="root" data-width="1920" data-height="1080">
        <div data-hf-id="hf-x7ad" class="scene-content clip" data-start="0.5" data-duration="9.5" data-track-index="0">
            <h1 data-hf-id="hf-6y3c" class="title" id="mainTitle">VIDCREATE</h1>
            <p data-hf-id="hf-4vnp" class="subtitle" id="subTitle">Motion Design Experience</p>
            <div data-hf-id="hf-ue8x" class="accent-line" id="line"></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
        <script>
            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });
            window.__timelines["root"] = tl;

            tl.from("#mainTitle", { 
                y: 100, 
                opacity: 0, 
                duration: 1.5, 
                ease: "expo.out" 
            }, 0.5);

            tl.from("#subTitle", { 
                letterSpacing: "20px",
                opacity: 0, 
                duration: 2, 
                ease: "power2.out" 
            }, 1.0);

            tl.from("#line", { 
                scaleX: 0,
                opacity: 0, 
                duration: 1, 
                ease: "power3.inOut" 
            }, 1.5);
        </script>
    </div>
</body>
</html>
