name: Render Video
on:
  workflow_dispatch:
    inputs:
      variables:
        description: 'JSON variables for the composition'
        required: false
        default: '{}'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Render Video
        run: npx hyperframes render --variables '${{ github.event.inputs.variables }}' --output video.mp4
        
      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: video.mp4
